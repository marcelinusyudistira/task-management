openapi: 3.0.3
info:
  title: Task Management Platform API
  version: 1.0.0
  description: RESTful API for task management with authentication, file uploads, and real-time features.
servers:
  - url: http://localhost:8000/api
    description: Local development

paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      token: { type: string }
        '422':
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out successfully

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/User' }

  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks with pagination and filtering
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 15, maximum: 100 }
        - name: status
          in: query
          schema: { type: string, enum: [pending, in_progress, completed, cancelled] }
        - name: priority
          in: query
          schema: { type: string, enum: [low, medium, high, urgent] }
        - name: assigned_user_id
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
        - name: sort_by
          in: query
          schema: { type: string, enum: [title, status, priority, due_date, created_at] }
        - name: sort_dir
          in: query
          schema: { type: string, enum: [asc, desc] }
      responses:
        '200':
          description: Paginated task list
    post:
      tags: [Tasks]
      summary: Create a new task
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, maxLength: 255 }
                description: { type: string }
                status: { type: string, enum: [pending, in_progress, completed, cancelled] }
                priority: { type: string, enum: [low, medium, high, urgent] }
                assigned_user_id: { type: integer, nullable: true }
                due_date: { type: string, format: date }
      responses:
        '201':
          description: Task created

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task details
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Task details with attachments and comments
    put:
      tags: [Tasks]
      summary: Update task
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [pending, in_progress, completed, cancelled] }
                priority: { type: string, enum: [low, medium, high, urgent] }
                assigned_user_id: { type: integer, nullable: true }
                due_date: { type: string, format: date }
      responses:
        '200':
          description: Task updated
    delete:
      tags: [Tasks]
      summary: Delete task
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Task deleted

  /tasks/{id}/attachments:
    post:
      tags: [Attachments]
      summary: Upload file attachment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Max 50MB. Allowed: jpeg, png, gif, webp, pdf, doc, docx, xls, xlsx, csv, txt, mp4, webm, zip"
      responses:
        '201':
          description: File uploaded

  /attachments/{id}/download:
    get:
      tags: [Attachments]
      summary: Download attachment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: File download

  /attachments/{id}:
    delete:
      tags: [Attachments]
      summary: Delete attachment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Attachment deleted

  /tasks/{id}/comments:
    get:
      tags: [Comments]
      summary: List task comments
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Paginated comments
    post:
      tags: [Comments]
      summary: Add comment to task
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, maxLength: 2000 }
      responses:
        '201':
          description: Comment added

  /comments/{id}:
    delete:
      tags: [Comments]
      summary: Delete comment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Comment deleted

  /events/tasks:
    get:
      tags: [Real-time]
      summary: SSE stream for task updates
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream: {}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [admin, manager, member] }

    Task:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [pending, in_progress, completed, cancelled] }
        priority: { type: string, enum: [low, medium, high, urgent] }
        assigned_user_id: { type: integer, nullable: true }
        created_by: { type: integer }
        due_date: { type: string, format: date, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskAttachment:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        file_name: { type: string }
        file_path: { type: string }
        file_size: { type: integer }
        mime_type: { type: string }
        uploaded_at: { type: string, format: date-time }

    TaskComment:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        user_id: { type: integer }
        comment: { type: string }
        created_at: { type: string, format: date-time }
